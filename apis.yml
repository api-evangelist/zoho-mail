aid: zoho-mail
name: Zoho Mail
description: Zoho Mail is an ad-free, privacy-first email and collaboration platform
  offering a comprehensive REST API for managing email accounts, folders, messages,
  contacts, calendars, and organizational email administration. The API supports 15
  modules including Organization, Domains, Groups, Users, Mail Policy, Accounts, Folders,
  Labels, Email Messages, Signatures, Threads, Tasks, Bookmarks, Notes, and Logs.
  Authentication uses OAuth 2.0 and responses are returned in JSON format with region-specific
  base URLs for US, Europe, India, Australia, Japan, Canada, UAE, Saudi Arabia, and
  China deployments.
